<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="How Schrödinger-Sync works: volatile Claude account state, observed by the tool, written to local Markdown">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4fd6e0"/>
      <stop offset="0.55" stop-color="#8b7bff"/>
      <stop offset="1" stop-color="#f4b942"/>
    </linearGradient>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b7bff"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="898" height="318" rx="18" fill="#0d0a1a" stroke="#241f3d" stroke-width="1.5"/>
  <text x="32" y="40" fill="#8b7bff" font-family="ui-monospace, Consolas, monospace" font-size="13" letter-spacing="3">HOW IT WORKS</text>

  <!-- stage 1: volatile -->
  <g>
    <rect x="30" y="92" width="228" height="164" rx="16" fill="none" stroke="#4fd6e0" stroke-width="1.6" stroke-dasharray="4 7" opacity="0.85"/>
    <text x="144" y="80" text-anchor="middle" fill="#4fd6e0" font-family="ui-monospace, Consolas, monospace" font-size="13" letter-spacing="2">VOLATILE</text>
    <path d="M50 172 q18 -32 36 0 q18 32 36 0 q18 -32 36 0 q18 32 36 0" fill="none" stroke="#4fd6e0" stroke-width="2.4" opacity="0.85"/>
    <text x="144" y="214" text-anchor="middle" fill="#ece9f6" font-family="system-ui, 'Segoe UI', sans-serif" font-size="15">Claude chats · docs · memory</text>
    <text x="144" y="236" text-anchor="middle" fill="#9a93bd" font-family="ui-monospace, Consolas, monospace" font-size="11.5">reachable only via your live session</text>
  </g>

  <path d="M266 174 H291" stroke="#8b7bff" stroke-width="2.2" marker-end="url(#arw)"/>

  <!-- stage 2: observe -->
  <g>
    <rect x="301" y="86" width="306" height="176" rx="16" fill="none" stroke="url(#flow)" stroke-width="2.2"/>
    <text x="454" y="80" text-anchor="middle" fill="#8b7bff" font-family="ui-monospace, Consolas, monospace" font-size="13" letter-spacing="2">OBSERVE</text>
    <circle cx="454" cy="150" r="30" fill="none" stroke="url(#flow)" stroke-width="2.6"/>
    <circle cx="454" cy="150" r="6" fill="#f4b942"/>
    <text x="454" y="212" text-anchor="middle" fill="#ece9f6" font-family="ui-monospace, Consolas, monospace" font-size="14" font-weight="700">schrödinger-sync</text>
    <text x="454" y="232" text-anchor="middle" fill="#9a93bd" font-family="ui-monospace, Consolas, monospace" font-size="11.5">DPAPI decrypt · CDP · same-origin fetch</text>
    <text x="454" y="248" text-anchor="middle" fill="#9a93bd" font-family="ui-monospace, Consolas, monospace" font-size="11.5">single Go binary · your account · no telemetry</text>
  </g>

  <path d="M615 174 H640" stroke="#f4b942" stroke-width="2.2" marker-end="url(#arw)"/>

  <!-- stage 3: captured -->
  <g>
    <rect x="650" y="92" width="220" height="164" rx="16" fill="none" stroke="#f4b942" stroke-width="1.8"/>
    <text x="760" y="80" text-anchor="middle" fill="#f4b942" font-family="ui-monospace, Consolas, monospace" font-size="13" letter-spacing="2">CAPTURED</text>
    <g stroke="#f4b942" stroke-width="2.2" fill="none" stroke-linecap="round">
      <rect x="737" y="126" width="46" height="58" rx="5"/>
      <path d="M747 142 h26 M747 154 h26 M747 166 h16"/>
    </g>
    <text x="760" y="214" text-anchor="middle" fill="#ece9f6" font-family="system-ui, 'Segoe UI', sans-serif" font-size="15">local Markdown, lossless</text>
    <text x="760" y="236" text-anchor="middle" fill="#9a93bd" font-family="ui-monospace, Consolas, monospace" font-size="11.5">%LOCALAPPDATA%\SchroedingerSync</text>
  </g>

  <text x="450" y="298" text-anchor="middle" fill="#635d84" font-family="system-ui, 'Segoe UI', sans-serif" font-size="12.5" font-style="italic">Your conversations exist in superposition — alive in the session, gone when it collapses. Schrödinger-Sync observes them first.</text>
</svg>
