<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Schrodinger-Sync captures your ephemeral claude.ai conversations, knowledge and memory into permanent local Markdown for your own AI memory system">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="violetPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#211a3b"/><stop offset="1" stop-color="#15131f"/>
    </linearGradient>
    <linearGradient id="greenPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f2a1c"/><stop offset="1" stop-color="#111c17"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" rx="26" fill="url(#bg)"/>

  <!-- Header -->
  <text x="64" y="66" fill="#a5b4fc" font-size="20" font-weight="700" letter-spacing="3">CLAUDE.AI → LOCAL MARKDOWN</text>
  <text x="64" y="120" fill="#f1f5f9" font-size="44" font-weight="800">Capture your chats <tspan fill="#4ade80">before the session collapses</tspan></text>
  <text x="64" y="152" fill="#94a3b8" font-size="19">Exports your own conversations, project knowledge and memory to Markdown — for your own local AI memory.</text>

  <!-- SUPERPOSITION panel -->
  <rect x="64" y="188" width="512" height="368" rx="18" fill="url(#violetPanel)" stroke="#818cf8" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="64" y="188" width="512" height="6" rx="3" fill="#818cf8"/>
  <text x="92" y="232" fill="#a5b4fc" font-size="17" font-weight="700" letter-spacing="2">IN SUPERPOSITION — claude.ai</text>

  <path d="M150 320 a34 34 0 0 1 6 -67 a44 44 0 0 1 84 8 a30 30 0 0 1 -4 59 z" fill="#818cf8" fill-opacity="0.16" stroke="#a5b4fc" stroke-opacity="0.5" stroke-width="1.5"/>

  <g font-size="19" fill="#dcd9f7">
    <circle cx="304" cy="272" r="5" fill="#818cf8"/><text x="322" y="278">Your conversations</text>
    <circle cx="304" cy="308" r="5" fill="#818cf8"/><text x="322" y="314">Project knowledge docs</text>
    <circle cx="304" cy="344" r="5" fill="#818cf8"/><text x="322" y="350">Memory &amp; preferences</text>
  </g>
  <text x="92" y="420" fill="#c4b5fd" font-size="18" font-weight="700">Ephemeral</text>
  <text x="94" y="446" fill="#94a3b8" font-size="16">lives in the cloud — gone when the session ends</text>

  <g font-size="15" font-weight="600">
    <rect x="92" y="474" width="176" height="34" rx="17" fill="#818cf8" fill-opacity="0.14"/>
    <text x="180" y="496" fill="#a5b4fc" text-anchor="middle">no local copy</text>
    <rect x="280" y="474" width="168" height="34" rx="17" fill="#818cf8" fill-opacity="0.14"/>
    <text x="364" y="496" fill="#a5b4fc" text-anchor="middle">not yours to keep</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(604,363)">
    <rect x="0" y="-9" width="72" height="18" rx="9" fill="url(#arrow)"/>
    <path d="M70 -20 L96 0 L70 20 Z" fill="#22c55e"/>
  </g>

  <!-- CAPTURED panel -->
  <rect x="704" y="188" width="512" height="368" rx="18" fill="url(#greenPanel)" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="704" y="188" width="512" height="6" rx="3" fill="#22c55e"/>
  <text x="732" y="232" fill="#4ade80" font-size="17" font-weight="700" letter-spacing="2">CAPTURED — LOCAL MARKDOWN</text>

  <g font-family="Consolas,'Courier New',monospace" font-size="18" fill="#bbf7d0">
    <text x="732" y="278">conversations/<tspan fill="#e2fbe8">*.md</tspan></text>
    <text x="732" y="314">knowledge/<tspan fill="#e2fbe8">*.md</tspan></text>
    <text x="732" y="350">memory/<tspan fill="#e2fbe8">*.md</tspan></text>
  </g>
  <text x="732" y="420" fill="#86efac" font-size="18" font-weight="700">Permanent · on your disk</text>
  <text x="734" y="446" fill="#94a3b8" font-size="16">feed it into your own AI memory (e.g. MemPalace)</text>

  <g font-size="15" font-weight="600">
    <rect x="732" y="474" width="168" height="34" rx="17" fill="#22c55e" fill-opacity="0.14"/>
    <text x="816" y="496" fill="#4ade80" text-anchor="middle">one Go binary</text>
    <rect x="912" y="474" width="186" height="34" rx="17" fill="#22c55e" fill-opacity="0.14"/>
    <text x="1005" y="496" fill="#4ade80" text-anchor="middle">your account only</text>
  </g>

  <!-- Footer -->
  <rect x="64" y="582" width="1152" height="34" rx="10" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <text x="88" y="604" fill="#cbd5e1" font-size="14">
    <tspan font-weight="700" fill="#a5b4fc">Safe by design:</tspan> single static Go binary · Windows · decrypts only your own DPAPI store (enforced in code, see SECURITY.md) · AGPLv3
  </text>
</svg>
